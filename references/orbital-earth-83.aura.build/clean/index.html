<body class="overflow-hidden text-neutral-200 antialiased selection:bg-neutral-700 selection:text-white h-screen w-screen relative">

    <!-- Three.js Canvas Container -->
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay Layer -->
    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-4 md:p-6">
        
        <!-- Header -->
        <header class="flex items-center justify-between w-full pointer-events-auto">
            <div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="font-semibold tracking-tight text-sm uppercase text-white">ORBITAL</span>
                <span class="text-neutral-500 text-xs">|</span>
                <span class="text-neutral-400 text-xs tracking-tight">LIVE FEED</span>
            </div>

            <div class="flex gap-2">
                <button class="glass-panel p-2 rounded-full text-neutral-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="18" height="18" viewBox="0 0 24 24" data-icon="lucide:settings-2" data-width="18" data-height="18" data-stroke-width="1.5" class="iconify iconify--lucide"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M14 17H5M19 7h-9"></path><circle cx="17" cy="17" r="3"></circle><circle cx="7" cy="7" r="3"></circle></g></svg>
                </button>
                <button class="glass-panel p-2 rounded-full text-neutral-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="18" height="18" viewBox="0 0 24 24" data-icon="lucide:share" data-width="18" data-height="18" data-stroke-width="1.5" class="iconify iconify--lucide"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v13m4-9l-4-4l-4 4m-4 6v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path></svg>
                </button>
            </div>
        </header>

        <!-- Main Controls (Bottom) -->
        <footer class="flex flex-col md:flex-row items-end md:items-center justify-between gap-4 pointer-events-auto">
            
            <!-- Data Readout -->
            <div class="hidden md:flex flex-col gap-1 text-xs font-mono text-neutral-500">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="14" height="14" viewBox="0 0 24 24" data-icon="lucide:crosshair" data-width="14" class="iconify iconify--lucide"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M22 12h-4M6 12H2m10-6V2m0 20v-4"></path></g></svg>
                    <span id="coord-display">LAT 32.0853° N • LON 34.7818° E</span>
                </div>
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="14" height="14" viewBox="0 0 24 24" data-icon="lucide:activity" data-width="14" class="iconify iconify--lucide"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"></path></svg>
                    <span>SYSTEM NORMAL</span>
                </div>
            </div>

            <!-- Control Deck -->
            <div class="glass-panel w-full md:w-96 rounded-2xl p-5 space-y-5">
                
                <div class="flex items-center justify-between border-b border-white/5 pb-3">
                    <span class="text-sm font-medium text-white">הגדרות תצוגה</span>
                    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="16" height="16" viewBox="0 0 24 24" data-icon="lucide:sliders-horizontal" data-width="16" class="iconify text-neutral-500 iconify--lucide"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 5H3m9 14H3M14 3v4m2 10v4m5-9h-9m9 7h-5m5-14h-7m-6 5v4m0-2H3"></path></svg>
                </div>

                <!-- Rotation Speed Slider -->
                <div class="space-y-2">
                    <div class="flex justify-between text-xs text-neutral-400">
                        <span>מהירות סיבוב</span>
                        <span id="speed-val">1.0x</span>
                    </div>
                    <input type="range" min="0" max="50" value="10" class="w-full" id="rotation-speed">
                </div>

                <!-- Lighting Slider -->
                <div class="space-y-2">
                    <div class="flex justify-between text-xs text-neutral-400">
                        <span>עוצמת שמש</span>
                        <span id="light-val">100%</span>
                    </div>
                    <input type="range" min="0" max="200" value="100" class="w-full" id="sun-intensity">
                </div>

                <!-- Toggles -->
                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="16" height="16" viewBox="0 0 24 24" data-icon="lucide:cloud" data-width="16" class="iconify text-neutral-400 iconify--lucide"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9"></path></svg>
                        <span class="text-xs text-neutral-300">אטמוספירה</span>
                    </div>
                    
                    <!-- Custom Toggle -->
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="atmos-toggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-neutral-900 appearance-none cursor-pointer transition-all duration-300 left-0 checked:left-5" checked="">
                        <label for="atmos-toggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-neutral-800 cursor-pointer transition-colors duration-300 checked:bg-neutral-600"></label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button id="reset-view" class="flex items-center justify-center gap-2 py-2 rounded-lg border border-white/10 text-xs font-medium hover:bg-white/5 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="14" height="14" viewBox="0 0 24 24" data-icon="lucide:rotate-ccw" data-width="14" class="iconify iconify--lucide"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9a9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></g></svg>
                        איפוס
                    </button>
                    <button class="flex items-center justify-center gap-2 py-2 rounded-lg bg-white text-black text-xs font-medium hover:bg-neutral-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" width="14" height="14" viewBox="0 0 24 24" data-icon="lucide:camera" data-width="14" class="iconify iconify--lucide"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"></path><circle cx="12" cy="13" r="3"></circle></g></svg>
                        צילום
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Three.js Libraries -->
    <script src="js/three.min.js"></script>
    <script src="js/OrbitControls.min.js"></script>

    <script>
        // --- Configuration & State ---
        let scene, camera, renderer, earthMesh, cloudsMesh, controls, sunLight;
        let rotationSpeed = 0.001;
        let isAtmosEnabled = true;

        // UI References
        const speedInput = document.getElementById('rotation-speed');
        const lightInput = document.getElementById('sun-intensity');
        const atmosToggle = document.getElementById('atmos-toggle');
        const speedVal = document.getElementById('speed-val');
        const lightVal = document.getElementById('light-val');
        const resetBtn = document.getElementById('reset-view');

        function init() {
            // Scene Setup
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            // Subtle Fog for depth
            scene.fog = new THREE.FogExp2(0x030303, 0.02);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Linear Tone Mapping for more realistic lighting (less washed out)
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // Soft cool ambient
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);

            // Backlight/Rim light for cinematic look
            const rimLight = new THREE.SpotLight(0x4f46e5, 2); // Indigo rim light
            rimLight.position.set(-5, 5, -2);
            rimLight.lookAt(0, 0, 0);
            scene.add(rimLight);

            // Create Objects
            createEarth();
            createStars();

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enablePan = false;
            controls.minDistance = 1.5;
            controls.maxDistance = 10;

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            setupUIListeners();
        }

        function createEarth() {
            const loader = new THREE.TextureLoader();
            const geometry = new THREE.SphereGeometry(1, 64, 64);

            // Earth Material
            const material = new THREE.MeshPhongMaterial({
                map: loader.load('images/earth_atmos_2048.jpg'),
                bumpMap: loader.load('images/earth_normal_2048.jpg'),
                bumpScale: 0.05,
                specularMap: loader.load('images/earth_specular_2048.jpg'),
                specular: new THREE.Color(0x333333),
                shininess: 15
            });

            earthMesh = new THREE.Mesh(geometry, material);
            scene.add(earthMesh);

            // Atmosphere / Clouds (Slightly larger sphere)
            const cloudGeometry = new THREE.SphereGeometry(1.02, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: loader.load('images/earth_clouds_1024.png'),
                side: THREE.DoubleSide,
                opacity: 0.8,
                transparent: true,
                depthWrite: false,
            });
            
            cloudsMesh = new THREE.Mesh(cloudGeometry, cloudMaterial);
            scene.add(cloudsMesh);
        }

        function createStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.02,
                transparent: true,
                opacity: 0.8
            });

            const starVertices = [];
            for (let i = 0; i < 2000; i++) {
                const x = (Math.random() - 0.5) * 20;
                const y = (Math.random() - 0.5) * 20;
                const z = (Math.random() - 0.5) * 20;
                // Keep stars away from center
                if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 5) {
                    starVertices.push(x, y, z);
                }
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        function setupUIListeners() {
            // Speed Slider
            speedInput.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                rotationSpeed = val * 0.0001; // Scale down for JS logic
                speedVal.innerText = (val / 10).toFixed(1) + "x";
            });

            // Light Slider
            lightInput.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value) / 100;
                sunLight.intensity = val * 1.5; // Base intensity is 1.5
                lightVal.innerText = Math.round(val * 100) + "%";
            });

            // Atmosphere Toggle
            atmosToggle.addEventListener('change', (e) => {
                isAtmosEnabled = e.target.checked;
                if(cloudsMesh) cloudsMesh.visible = isAtmosEnabled;
            });

            // Reset Button
            resetBtn.addEventListener('click', () => {
                controls.reset();
                rotationSpeed = 0.001;
                speedInput.value = 10;
                speedVal.innerText = "1.0x";
                sunLight.intensity = 1.5;
                lightInput.value = 100;
                lightVal.innerText = "100%";
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (earthMesh) {
                earthMesh.rotation.y += rotationSpeed;
            }
            if (cloudsMesh) {
                cloudsMesh.rotation.y += rotationSpeed * 1.1; // Clouds move slightly faster
            }

            // Fake data update for UI
            const coordDisplay = document.getElementById('coord-display');
            if(coordDisplay && earthMesh) {
                // Just pseudo-randomizing last digit to look alive
                if(Math.random() > 0.9) {
                     // Keep static text mostly
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();

    </script>
