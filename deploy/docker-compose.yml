name: pvu-diploma-project

services:
  pvu-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: pvu-diploma-app
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --app-dir
      - src
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ../artifacts:/app/artifacts
      - ../config:/app/config:ro
      - ../data:/app/data:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
