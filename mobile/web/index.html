<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AHU Simulator Mobile Shell</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #23303b, #0b0e12 60%);
        color: #f3efe6;
        font-family: "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        padding: 24px;
        border: 1px solid rgba(243, 239, 230, 0.18);
        border-radius: 16px;
        background: rgba(10, 14, 18, 0.72);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(243, 239, 230, 0.8);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AHU Simulator Mobile</h1>
      <p>
        This is a Capacitor shell. Main dashboard is loaded from the configured HTTPS backend.
      </p>
    </main>
  </body>
</html>
