project_name: "PVU Diploma Project"
api_prefix: ""
dashboard_path: "/dashboard"
default_scenario_id: "midseason"
trend_horizon_minutes: 120
trend_step_minutes: 10
nominal_airflow_m3_h: 3200
base_filter_pressure_drop_pa: 120
max_filter_pressure_drop_pa: 420
status_thresholds:
  supply_temp_gap_c:
    warning: 1.5
    alarm: 3.0
  airflow_ratio:
    warning: 0.75
    alarm: 0.6
  filter_pressure_drop_pa:
    warning: 280
    alarm: 360
  heater_load_ratio:
    warning: 0.85
    alarm: 0.95
  energy_intensity_kw_per_1000_m3_h:
    warning: 6.5
    alarm: 8.0
  room_temp_c:
    warning_low: 18
    alarm_low: 16
    warning_high: 27
    alarm_high: 29
  outdoor_temp_c:
    warning_low: -25
    alarm_low: -32
    warning_high: 32
    alarm_high: 35
  co2_ppm:
    warning: 900
    alarm: 1200
  humidity_percent:
    warning_low: 35
    alarm_low: 30
    warning_high: 60
    alarm_high: 65
  occupancy_ratio:
    warning: 0.85
    alarm: 1.05
cors_allow_origins:
  - "http://127.0.0.1"
  - "http://localhost"
  - "http://127.0.0.1:8000"
  - "http://localhost:8000"
cors_allow_methods:
  - "GET"
  - "POST"
  - "OPTIONS"
cors_allow_headers:
  - "*"
cors_allow_credentials: true
trusted_hosts:
  - "*"
enforce_https_redirect: false
