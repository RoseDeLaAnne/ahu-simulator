name: windows-pyinstaller

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Resolve release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Tag '$tag' must start with 'v'."
          }
          $version = $tag.Substring(1)
          "AHU_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using release version from tag: $version"

      - name: Build Windows onedir bundle
        shell: pwsh
        run: |
          ./deploy/build-windows-exe.ps1 -Clean

      - name: Sign Windows executable (optional)
        if: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            throw "signtool.exe was not found on this runner."
          }

          $timestampUrl = if ($env:WINDOWS_CODESIGN_TIMESTAMP_URL) {
            $env:WINDOWS_CODESIGN_TIMESTAMP_URL
          }
          else {
            "http://timestamp.digicert.com"
          }

          $targetExe = "dist/windows-exe/AhuSimulator/AhuSimulator.exe"
          & $signtool.FullName sign /f $certPath /p $env:WINDOWS_CODESIGN_PASSWORD /fd SHA256 /tr $timestampUrl /td SHA256 $targetExe
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed with exit code $LASTEXITCODE"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-pyinstaller-${{ github.run_number }}
          path: dist/windows-exe/AhuSimulator/**
          if-no-files-found: error
