name: android-capacitor

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Resolve release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "AHU_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using release version from tag: $VERSION"

      - name: Configure Android keystore (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_ALIAS_PASSWORD != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/ahu-release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "AHU_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "AHU_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "AHU_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "AHU_ANDROID_KEY_ALIAS_PASSWORD=$ANDROID_KEY_ALIAS_PASSWORD"
            echo "MOBILE_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "MOBILE_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "MOBILE_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "MOBILE_ANDROID_KEY_ALIAS_PASSWORD=$ANDROID_KEY_ALIAS_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build Android release AAB
        shell: pwsh
        working-directory: mobile
        env:
          MOBILE_BACKEND_HTTPS_URL: ${{ vars.MOBILE_BACKEND_HTTPS_URL }}
        run: |
          npm run build:release:aab

      - name: Build Android release APK
        shell: pwsh
        working-directory: mobile
        env:
          MOBILE_BACKEND_HTTPS_URL: ${{ vars.MOBILE_BACKEND_HTTPS_URL }}
        run: |
          npm run build:release:apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-capacitor-${{ github.run_number }}
          path: |
            mobile/android/app/build/outputs/apk/release/*.apk
            mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
